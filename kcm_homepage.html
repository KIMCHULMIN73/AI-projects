<script>
function updateClock() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent = now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+days[now.getDay()]+')';
}
setInterval(updateClock,1000); updateClock();

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if(q) window.open('https://www.google.com/search?q='+encodeURIComponent(q),'_blank');
}

const WMO = {0:'☀️ 맑음',1:'🌤️ 대체로 맑음',2:'⛅ 구름 조금',3:'☁️ 흐림',45:'🌫️ 안개',48:'🌫️ 짙은 안개',51:'🌦️ 이슬비',53:'🌦️ 이슬비',55:'🌧️ 이슬비',61:'🌧️ 비',63:'🌧️ 비',65:'🌧️ 강한 비',71:'❄️ 눈',73:'❄️ 눈',75:'❄️ 폭설',80:'🌦️ 소나기',81:'🌧️ 소나기',82:'⛈️ 강한 소나기',95:'⛈️ 천둥번개',96:'⛈️ 우박',99:'⛈️ 심한 우박'};

async function loadWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.57&longitude=126.98&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weathercode&wind_speed_unit=ms&timezone=Asia%2FSeoul');
    const d = await r.json(), c = d.current;
    const desc = WMO[c.weathercode]||'🌡️ -', icon = desc.split(' ')[0], label = desc.split(' ').slice(1).join(' ');
    document.getElementById('weather-content').innerHTML =
      '<div class="weather-main"><div class="weather-icon">'+icon+'</div><div><div class="weather-temp">'+Math.round(c.temperature_2m)+'°C</div><div class="weather-desc">'+label+'</div></div></div>' +
      '<div class="weather-details"><span>체감 '+Math.round(c.apparent_temperature)+'°C</span><span>습도 '+c.relative_humidity_2m+'%</span><span>바람 '+c.wind_speed_10m+'m/s</span></div>';
  } catch(e) {
    document.getElementById('weather-content').innerHTML = '<div class="news-loading">날씨를 불러올 수 없습니다.</div>';
  }
}

async function loadMarkets() {
  try {
    const [r1,r2,r3] = await Promise.all([
      fetch('https://api.frankfurter.dev/v2/rates?base=USD&quotes=KRW'),
      fetch('https://api.frankfurter.dev/v2/rates?base=EUR&quotes=KRW'),
      fetch('https://api.frankfurter.dev/v2/rates?base=JPY&quotes=KRW')
    ]);
    const [d1,d2,d3] = await Promise.all([r1.json(),r2.json(),r3.json()]);
    const fx = [
      {name:'USD/KRW', val:d1.rates.KRW.toFixed(0)},
      {name:'EUR/KRW', val:d2.rates.KRW.toFixed(0)},
      {name:'JPY/KRW(100)', val:(d3.rates.KRW*100).toFixed(2)}
    ];
    // new frankfurter.dev returns { rates: { KRW: ... } }
    const fxCard = f => '<div class="market-card"><div class="market-name">'+f.name+'</div><div class="market-val">'+f.val+'</div><div class="market-chg" style="color:#888">실시간</div></div>';
    const dash = '<div class="market-card"><div class="market-name">—</div><div class="market-val">—</div><div class="market-chg" style="color:#bbb">별도 API 필요</div></div>';
    const tickHtml = fx.map(f=>'<span class="tick-item"><span class="tick-label">'+f.name+'</span><span>'+f.val+'</span></span>').join('');
    document.getElementById('ticker-content').innerHTML = tickHtml+tickHtml;
    document.getElementById('market-content').innerHTML =
      '<div class="markets-subtitle">🇺🇸 미국 증시</div><div class="markets-grid">'+dash+dash+dash+'</div>' +
      '<div class="markets-subtitle">🇰🇷 국내 증시</div><div class="markets-grid">'+dash+dash+'</div>' +
      '<div class="markets-subtitle">💱 실시간 환율</div><div class="markets-grid">'+fx.map(fxCard).join('')+'</div>';
  } catch(e) {
    document.getElementById('market-content').innerHTML = '<div class="news-loading">시장 데이터를 불러올 수 없습니다.</div>';
  }
}

function switchTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;
  loadNews(tab);
}

function loadNews(tab) {
  const news = NEWS_DB[tab] || NEWS_DB.all;
  document.getElementById('news-content').innerHTML = '<div class="news-grid">' +
    news.map(n =>
      '<div class="news-card">' +
      '<div class="news-source"><span class="tag">'+n.tag+'</span> '+n.source+'</div>' +
      '<div class="news-title"><a href="'+n.url+'" target="_blank">'+n.title+'</a></div>' +
      '<div class="news-summary">'+n.summary+'</div>' +
      '<div class="news-time">'+n.time+'</div>' +
      '</div>'
    ).join('') + '</div>';
}

loadWeather();
loadMarkets();
loadNews('all');
