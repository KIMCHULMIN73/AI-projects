<script>
//// ---------- AUDIO (chiptune / PSG style) ----------
const actx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, dur, type='square', vol=0.15, delay=0) {
  const t0 = actx.currentTime + delay;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.setValueAtTime(vol, t0 + dur*0.6);
  gain.gain.linearRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(gain); gain.connect(actx.destination);
  osc.start(t0); osc.stop(t0 + dur);
}

function steppedSweep(f1, f2, steps, stepDur, type='square', vol=0.16, delay=0) {
  if (steps < 2) { beep(f1, stepDur, type, vol, delay); return; }
  const t0 = actx.currentTime + delay;
  for (let i=0;i<steps;i++) {
    const f = f1 + (f2-f1)*(i/(steps-1));
    const st = t0 + i*stepDur;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f, st);
    gain.gain.setValueAtTime(vol, st);
    gain.gain.linearRampToValueAtTime(0.0001, st + stepDur*0.95);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(st); osc.stop(st + stepDur);
  }
}

function noiseBurst(dur, vol=0.2, delay=0, bits=4) {
  const bufferSize = Math.floor(actx.sampleRate * dur);
  const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  const data = buffer.getChannelData(0);
  const levels = Math.pow(2, bits);
  for (let i=0;i<bufferSize;i++) {
    const raw = (Math.random()*2-1) * (1 - i/bufferSize);
    data[i] = Math.round(raw*levels)/levels;
  }
  const noise = actx.createBufferSource();
  noise.buffer = buffer;
  const gain = actx.createGain();
  gain.gain.setValueAtTime(vol, actx.currentTime + delay);
  noise.connect(gain); gain.connect(actx.destination);
  noise.start(actx.currentTime + delay);
}

function sfxFire() { steppedSweep(180, 760, 7, 0.025, 'square', 0.14); }
function sfxExplode() {
  noiseBurst(0.35, 0.28, 0, 3);
  steppedSweep(260, 40, 8, 0.04, 'square', 0.16);
}
function sfxHitLife() {
  noiseBurst(0.45, 0.32, 0, 3);
  steppedSweep(500, 30, 10, 0.04, 'square', 0.2);
  beep(70, 0.3, 'square', 0.15, 0.15);
}
function sfxFall() {
  steppedSweep(440, 110, 8, 0.035, 'triangle', 0.14);
}
function sfxMove() {
  beep(150 + Math.random()*20, 0.05, 'square', 0.05);
}
function flashTitle() {
  const el = document.getElementById('bottomTitle');
  el.classList.remove('flash-title');
  void el.offsetWidth;
  el.classList.add('flash-title');
  setTimeout(() => el.classList.remove('flash-title'), 650);
}
function playStartMusic() {
  const notes = [261,261,392,523,659,523,392,659];
  notes.forEach((f,i)=> beep(f, 0.13, 'square', 0.1, i*0.15));
}
function playWinMusic() {
  const notes = [523,659,784,1046,784,1046,1318,1046,1318,1568];
  notes.forEach((f,i)=> beep(f, 0.15, 'square', 0.13, i*0.15));
}
function playLoseMusic() {
  const notes = [392,349,311,261,196];
  notes.forEach((f,i)=> beep(f, 0.26, 'square', 0.12, i*0.24));
}

//// ---------- BGM: low, ominous, 80s stealth-military ambient ----------
let bgmPlaying = false;
let bgmNodes = [];
let bgmInterval = null;
let musicEnabled = true;

function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;

  const bgmGain = actx.createGain();
  bgmGain.gain.value = 0.045;
  bgmGain.connect(actx.destination);

  const o1 = actx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = 55;
  const o2 = actx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = 55 * 1.008;
  const filter = actx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 380;
  filter.Q.value = 4;
  o1.connect(filter); o2.connect(filter); filter.connect(bgmGain);

  const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.045;
  const lfoGain = actx.createGain(); lfoGain.gain.value = 140;
  lfo.connect(lfoGain); lfoGain.connect(filter.frequency);

  o1.start(); o2.start(); lfo.start();
  bgmNodes = [o1, o2, lfo, filter, bgmGain];

  const motif = [55, 58.27, 55, 49];
  let step = 0;
  bgmInterval = setInterval(() => {
    if (!bgmPlaying) return;
    const n = motif[step % motif.length];
    step++;
    beep(n, 0.5, 'square', 0.05);
    if (Math.random() < 0.22) beep(n*4, 0.12, 'square', 0.025, 0.35);
  }, 1900);
}

function stopBGM() {
  bgmPlaying = false;
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
  bgmNodes.forEach(n => {
    try { n.stop && n.stop(); } catch(e) {}
    try { n.disconnect(); } catch(e) {}
  });
  bgmNodes = [];
}

document.addEventListener('keydown', (e) => {
  if (e.key === 's' || e.key === 'S') {
    musicEnabled = !musicEnabled;
    if (!musicEnabled) stopBGM();
  }
});

function updateMusicState() {
  if (skyStartTime === null) return;
  if (musicEnabled) { if (!bgmPlaying) startBGM(); }
  else { if (bgmPlaying) stopBGM(); }
}

//// ---------- CANVAS SETUP ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = canvas.width, H = canvas.height;
const GREEN = '#00ff41';
const GREEN_DIM = '#0a5c22';
const P1_COLOR = '#00ff41';
const P1_DIM = '#0a5c22';
const P2_COLOR = '#ff7b1c';
const P2_DIM = '#7a3a0c';

const CONTROLS_RESERVE = 105;

//// ---------- DAY/NIGHT SKY CYCLE (visual only) ----------
let skyStartTime = null;
const SKY_HALF_PERIOD = 90;

const STARS = Array.from({length: 90}, () => ({
  x: Math.random()*W,
  y: Math.random()*(H*0.55),
  baseB: 0.3 + Math.random()*0.7,
  speed: 0.5 + Math.random()*1.5,
  phase: Math.random()*Math.PI*2
}));

function getSkyBlend() {
  if (skyStartTime === null) return 0;
  const elapsed = (performance.now() - skyStartTime) / 1000;
  return (1 - Math.cos(elapsed * Math.PI / SKY_HALF_PERIOD)) / 2;
}

function lerp(a,b,t){ return a+(b-a)*t; }
function lerpColor(c1,c2,t){
  return [Math.round(lerp(c1[0],c2[0],t)), Math.round(lerp(c1[1],c2[1],t)), Math.round(lerp(c1[2],c2[2],t))];
}

function drawSky(blend) {
  const nightTop = [0,6,4], nightBottom = [0,28,15];
  const dayTop = [0,35,20], dayBottom = [70,255,110];

  const topC = lerpColor(nightTop, dayTop, blend);
  const botC = lerpColor(nightBottom, dayBottom, blend);

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, `rgb(${topC[0]},${topC[1]},${topC[2]})`);
  grad.addColorStop(1, `rgb(${botC[0]},${botC[1]},${botC[2]})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  const starAlpha = 1 - blend;
  if (starAlpha > 0.02) {
    const t = performance.now()/1000;
    STARS.forEach(s => {
      const twinkle = 0.5 + 0.5*Math.sin(t*s.speed + s.phase);
      ctx.globalAlpha = starAlpha * s.baseB * twinkle;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(s.x, s.y, 2, 2);
    });
    ctx.globalAlpha = 1;
  }
}

//// ---------- GAME STATE ----------
let player1Name = 'PLAYER 1';
let player2Name = 'PLAYER 2';
let p1Life = 3, p2Life = 3;
let p1Rounds = 0, p2Rounds = 0;
let p1Medals = 0, p2Medals = 0;
let p1Fuel = 20, p2Fuel = 20; // resets only when a match is decided
let currentTurn = 1;
let terrain = [];
let wind = 0;
let projectile = null;
let gameOver = false;
let matchOver = false;
let roundActive = true;
let tankP1 = { x: 90, y: 0, angle: 45, power: 50, falling:false, fallTarget:0 };
let tankP2 = { x: 790, y: 0, angle: 45, power: 50, falling:false, fallTarget:0 };
let explosionFx = null;
let tankExplosions = [];
let animId = null;

const PIXEL = 2;

//// ---------- TANK SPRITE ----------
const TANK_SPRITE = [
  "000000000000000000000000",
  "000000000001111110000000",
  "000000111111111111100000",
  "111111111111111111111111",
  "111111111111111111111111",
  "000011111111111111100000",
  "222222222222222222220000",
  "330033003300330033003300",
  "330033003300330033003300",
  "000000000000000000000000"
];
const TANK_ROWS = TANK_SPRITE.length;
const TANK_COLS = TANK_SPRITE[0].length;
const TANK_W = TANK_COLS*PIXEL, TANK_H = TANK_ROWS*PIXEL;

//// ---------- TERRAIN GENERATION (midpoint displacement = natural look) ----------
function generateTerrain() {
  const segments = 257;
  const STEP = 1.5;
  const minH = 120, maxH = H - CONTROLS_RESERVE - 110;

  const raw = new Array(segments);
  const startH = minH + Math.random()*(maxH-minH);
  const endH = minH + Math.random()*(maxH-minH);
  raw[0] = startH;
  raw[segments-1] = endH;

  let roughness = 0.6 + Math.random()*0.25;
  function displace(left, right, disp) {
    if (right - left < 2) return;
    const mid = Math.floor((left+right)/2);
    raw[mid] = (raw[left]+raw[right])/2 + (Math.random()*2-1)*disp;
    displace(left, mid, disp*roughness);
    displace(mid, right, disp*roughness);
  }
  displace(0, segments-1, 160);

  const smoothed = raw.slice();
  for (let i=1;i<segments-1;i++) {
    smoothed[i] = raw[i-1]*0.25 + raw[i]*0.5 + raw[i+1]*0.25;
  }

  const heights = smoothed.map(h => {
    const clamped = Math.max(minH, Math.min(maxH, h));
    return Math.round(clamped/STEP)*STEP;
  });

  terrain = [];
  const dx = W/(segments-1);
  for (let i=0;i<segments;i++) {
    const x0 = i*dx;
    terrain.push({ x:x0, y:heights[i] });
    if (i < segments-1) terrain.push({ x:x0+dx, y:heights[i] });
  }
}

function terrainHeightAt(x) {
  for (let i=0;i<terrain.length-1;i++) {
    const a = terrain[i], b = terrain[i+1];
    if (x >= a.x && x <= b.x) {
      const t = (x-a.x)/(b.x-a.x);
      return a.y + (b.y-a.y)*t;
    }
  }
  return terrain[terrain.length-1].y;
}

function getTerrainSlopeAngle(x) {
  const d = 8;
  const h1 = terrainHeightAt(Math.max(0, x-d));
  const h2 = terrainHeightAt(Math.min(W, x+d));
  return Math.atan2(h2-h1, d*2);
}

function placeTanks() {
  tankP1.x = 90;
  tankP2.x = W-90;
  tankP1.y = terrainHeightAt(tankP1.x);
  tankP2.y = terrainHeightAt(tankP2.x);
  tankP1.falling = false;
  tankP2.falling = false;
}

//// ---------- DRAWING ----------
function drawTerrain() {
  ctx.beginPath();
  ctx.moveTo(0, H);
  terrain.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = GREEN_DIM;
  ctx.fill();
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = 2;
  ctx.beginPath();
  terrain.forEach((p,i)=> i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();
}

function drawPixelTank(tank, sprite, color, dimColor, facing) {
  const rows = sprite.length;
  const cols = sprite[0].length;
  const w = cols*PIXEL, h = rows*PIXEL;
  const tilt = getTerrainSlopeAngle(tank.x);
  ctx.save();
  ctx.translate(tank.x, tank.y);
  ctx.rotate(tilt);
  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      const cell = sprite[r][c];
      if (cell === '0') continue;
      const px = facing === 1 ? c : (cols-1-c);
      if (cell === '1') ctx.fillStyle = color;
      else if (cell === '2') ctx.fillStyle = dimColor;
      else if (cell === '3') ctx.fillStyle = '#ffffff';
      ctx.fillRect(px*PIXEL - w/2, r*PIXEL - h, PIXEL, PIXEL);
    }
  }
  ctx.restore();

  const tip = getBarrelTip(tank, facing);
  const pivot = getBarrelPivot(tank);
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(pivot.x, pivot.y);
  ctx.lineTo(tip.x, tip.y);
  ctx.stroke();
}

// pivot is anchored to the turret, so it must rotate together with the
// tilted hull (otherwise the barrel visually detaches on slopes)
function getBarrelPivot(tank) {
  const h = TANK_ROWS*PIXEL;
  const D = h*0.6;
  const tilt = getTerrainSlopeAngle(tank.x);
  return { x: tank.x + D*Math.sin(tilt), y: tank.y - D*Math.cos(tilt) };
}

// the ANGLE slider (0-90) is measured relative to the tank's own hull, not
// the world -- so the hull's terrain tilt is composed on top of it here
function getBarrelDir(tank, facing) {
  const theta = tank.angle * Math.PI/180;
  let lx = Math.cos(theta), ly = -Math.sin(theta);
  if (facing === -1) lx = -lx;
  const tilt = getTerrainSlopeAngle(tank.x);
  const rx = lx*Math.cos(tilt) - ly*Math.sin(tilt);
  const ry = lx*Math.sin(tilt) + ly*Math.cos(tilt);
  return { x: rx, y: ry };
}

function getBarrelTip(tank, facing) {
  const pivot = getBarrelPivot(tank);
  const dir = getBarrelDir(tank, facing);
  const len = 30;
  return { x: pivot.x + dir.x*len, y: pivot.y + dir.y*len };
}

function drawTrajectoryDots(trail) {
  ctx.fillStyle = GREEN;
  trail.forEach((p,i)=> {
    if (i % 2 === 0) {
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.6, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
}

function drawProjectile(p) {
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
  ctx.fill();
}

function drawExplosion(fx) {
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI*2);
  ctx.stroke();
}

function spawnTankExplosion(x, y, color) {
  const particles = [];
  const count = 26;
  for (let i=0;i<count;i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 1.5 + Math.random()*4.5;
    particles.push({
      x:0, y:0,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd - 1.5,
      size: 2 + Math.floor(Math.random()*3),
      life: 30 + Math.random()*20
    });
  }
  tankExplosions.push({ x, y, color, particles, t:0, flashT: 10 });
}

function updateTankExplosions() {
  tankExplosions.forEach(ex => {
    ex.t++;
    ex.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.life--;
    });
    ex.particles = ex.particles.filter(p => p.life > 0);
  });
  tankExplosions = tankExplosions.filter(ex => ex.particles.length > 0 || ex.t < 12);
}

function drawTankExplosions() {
  tankExplosions.forEach(ex => {
    if (ex.t < ex.flashT) {
      const a = 1 - ex.t/ex.flashT;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(ex.x, ex.y, 10 + ex.t*4, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = ex.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(ex.x, ex.y, 14 + ex.t*6, 0, Math.PI*2);
      ctx.stroke();
    }
    ex.particles.forEach(p => {
      const fade = Math.max(0, p.life/40);
      ctx.globalAlpha = fade;
      ctx.fillStyle = p.life > 18 ? '#ffffff' : ex.color;
      ctx.fillRect(ex.x+p.x - p.size/2, ex.y+p.y - p.size/2, p.size, p.size);
      ctx.globalAlpha = 1;
    });
  });
}

function drawWindArrow(cx, cy, strength, dirSign) {
  ctx.save();
  ctx.translate(cx, cy);
  if (dirSign === 0) {
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-14,0); ctx.lineTo(14,0);
    ctx.stroke();
  } else {
    const len = 24 + Math.min(46, strength*4);
    ctx.scale(dirSign, 1);
    ctx.fillStyle = GREEN;
    ctx.beginPath();
    ctx.moveTo(-len/2, -5);
    ctx.lineTo(len/2-14, -5);
    ctx.lineTo(len/2-14, -12);
    ctx.lineTo(len/2+6, 0);
    ctx.lineTo(len/2-14, 12);
    ctx.lineTo(len/2-14, 5);
    ctx.lineTo(-len/2, 5);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawLifeIcon(x,y,filled,color,scale) {
  const w = 42*scale, h = 30*scale;
  ctx.strokeStyle = color;
  ctx.lineWidth = 3*scale;
  ctx.strokeRect(x, y, w, h);
  if (filled) { ctx.fillStyle = color; ctx.fillRect(x+6*scale,y+6*scale,30*scale,18*scale); }
}

function drawHUD() {
  ctx.fillStyle = GREEN;
  ctx.font = 'bold 22px "Courier New"';
  const windLabel = `WIND ${Math.abs(wind).toFixed(1)}`;
  const labelW = ctx.measureText(windLabel).width;
  const arrowW = 56;
  const totalW = labelW + 14 + arrowW;
  const rowStartX = W/2 - totalW/2;
  ctx.textAlign = 'left';
  ctx.fillText(windLabel, rowStartX, 32);
  const dirSign = wind > 0.05 ? 1 : (wind < -0.05 ? -1 : 0);
  drawWindArrow(rowStartX + labelW + 14 + arrowW/2, 26, Math.abs(wind), dirSign);

  ctx.textAlign = 'center';
  ctx.font = 'bold 13px "Courier New"';
  ctx.fillText(currentTurn===1 ? `\u25C0 ${player1Name.toUpperCase()} TURN` : `${player2Name.toUpperCase()} TURN \u25B6`, W/2, 58);

  ctx.textAlign = 'left';
  ctx.font = '13px "Courier New"';
  ctx.fillStyle = P1_COLOR;
  ctx.fillText(player1Name.toUpperCase(), 16, 20);
  ctx.font = 'bold 42px "Courier New"';
  ctx.fillText(`${p1Rounds*10}`, 16, 62);
  for (let i=0;i<3;i++) drawLifeIcon(16 + i*25, 72, i < p1Life, P1_COLOR, 0.5);
  if (p1Medals > 0) {
    ctx.font = '16px serif';
    ctx.fillText('\uD83E\uDD85'.repeat(p1Medals), 16, 108);
  }

  ctx.textAlign = 'right';
  ctx.fillStyle = P2_COLOR;
  ctx.font = '13px "Courier New"';
  ctx.fillText(player2Name.toUpperCase(), W-16, 20);
  ctx.font = 'bold 42px "Courier New"';
  ctx.fillText(`${p2Rounds*10}`, W-16, 62);
  for (let i=0;i<3;i++) drawLifeIcon(W-16-25 - i*25, 72, i < p2Life, P2_COLOR, 0.5);
  if (p2Medals > 0) {
    ctx.font = '16px serif';
    ctx.fillText('\uD83E\uDD85'.repeat(p2Medals), W-16, 108);
  }
}

function render() {
  const blend = getSkyBlend();
  drawSky(blend);

  drawTerrain();
  drawPixelTank(tankP1, TANK_SPRITE, P1_COLOR, P1_DIM, 1);
  drawPixelTank(tankP2, TANK_SPRITE, P2_COLOR, P2_DIM, -1);

  if (projectile) {
    drawTrajectoryDots(projectile.trail);
    drawProjectile(projectile);
  }
  if (explosionFx) drawExplosion(explosionFx);
  drawTankExplosions();

  drawHUD();
}

//// ---------- PHYSICS ----------
const GRAVITY = 0.25;

function randomizeWind() {
  wind = (Math.random()*16 - 8);
}

function fire(playerNum) {
  if (!roundActive || projectile || gameOver) return;
  const tank = playerNum === 1 ? tankP1 : tankP2;
  const facing = playerNum === 1 ? 1 : -1;
  const power = tank.power;
  const speed = power * 0.18;
  const dir = getBarrelDir(tank, facing);
  const tip = getBarrelTip(tank, facing);
  projectile = {
    x: tip.x,
    y: tip.y,
    vx: dir.x*speed,
    vy: dir.y*speed,
    trail: [],
    owner: playerNum
  };
  sfxFire();
}

function updateProjectile() {
  if (!projectile) return;
  projectile.vx += wind*0.0045;
  projectile.vy += GRAVITY;
  projectile.x += projectile.vx;
  projectile.y += projectile.vy;
  projectile.trail.push({x:projectile.x, y:projectile.y});
  if (projectile.trail.length > 250) projectile.trail.shift();

  if (projectile.x < -20 || projectile.x > W+20 || projectile.y > H+20) {
    endProjectile();
    return;
  }

  const target = projectile.owner === 1 ? tankP2 : tankP1;
  const dx = projectile.x - target.x;
  const dy = projectile.y - (target.y - TANK_H/2);
  if (Math.abs(dx) < TANK_W/2+5 && Math.abs(dy) < TANK_H/2+8) {
    checkHitAndResolve(target === tankP1 ? 1 : 2);
    return;
  }

  const th = terrainHeightAt(Math.max(0,Math.min(W,projectile.x)));
  if (projectile.y >= th) {
    checkHitAndResolve();
    return;
  }
}

function checkHitAndResolve(hitPlayer) {
  const impactSpeed = Math.hypot(projectile.vx, projectile.vy);
  explosionFx = { x: projectile.x, y: projectile.y, r: 4, t: 0 };
  craterTerrain(projectile.x, impactSpeed);
  sfxExplode();
  if (hitPlayer) {
    sfxHitLife();
    const target = hitPlayer === 1 ? tankP1 : tankP2;
    spawnTankExplosion(target.x, target.y - TANK_H, hitPlayer===1 ? P1_COLOR : P2_COLOR);
    if (hitPlayer === 1) p1Life--; else p2Life--;
    flashTitle();
  }
  projectile = null;
  roundActive = false;
  randomizeWind();

  setTimeout(() => resolveFalls(hitPlayer), 250);
}

function resolveFalls(hitPlayer) {
  const checks = [
    { tank: tankP1, num: 1 },
    { tank: tankP2, num: 2 }
  ];
  let anyFalling = false;
  checks.forEach(({tank, num}) => {
    const groundY = terrainHeightAt(tank.x);
    const gap = groundY - tank.y;
    if (gap > 6) {
      anyFalling = true;
      tank.falling = true;
      tank.fallTarget = groundY;
      const fatal = gap > 38;
      animateFall(tank, fatal, num, hitPlayer);
    }
  });
  if (!anyFalling) {
    finishResolution(hitPlayer);
  }
}

function animateFall(tank, fatal, num, hitPlayer) {
  sfxFall();
  const startY = tank.y;
  const endY = tank.fallTarget;
  const dur = 450;
  const t0 = performance.now();
  function step(now) {
    const t = Math.min(1, (now-t0)/dur);
    tank.y = startY + (endY-startY)*t;
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      tank.falling = false;
      if (fatal) {
        if (num === 1) p1Life--; else p2Life--;
        spawnTankExplosion(tank.x, tank.y - TANK_H, num===1 ? P1_COLOR : P2_COLOR);
        sfxHitLife();
        flashTitle();
      }
      finishResolution(hitPlayer);
    }
  }
  requestAnimationFrame(step);
}

let resolvedOnce = false;
function finishResolution() {
  if (resolvedOnce) return;
  resolvedOnce = true;
  setTimeout(() => {
    resolvedOnce = false;
    if (p1Life <= 0 || p2Life <= 0) {
      resolveRoundEnd();
    } else {
      currentTurn = currentTurn === 1 ? 2 : 1;
      roundActive = true;
      updateFireButtons();
    }
  }, 500);
}

function endProjectile() {
  projectile = null;
  roundActive = false;
  randomizeWind();
  setTimeout(() => {
    currentTurn = currentTurn === 1 ? 2 : 1;
    roundActive = true;
    updateFireButtons();
  }, 350);
}

function craterTerrain(x, impactSpeed) {
  const speed = impactSpeed || 5;
  const radius = Math.min(55, 16 + speed*2.2);
  const maxDepth = Math.min(70, 14 + speed*3.2);
  const floor = H - CONTROLS_RESERVE - 4;
  terrain.forEach(p => {
    const d = Math.abs(p.x - x);
    if (d < radius) {
      const t = d/radius;
      const dip = (1 - Math.pow(t, 3)) * maxDepth;
      p.y = Math.min(floor, p.y + dip);
    }
  });
}

function resolveRoundEnd() {
  const winner = p1Life <= 0 ? 2 : 1;
  if (winner === 1) p1Rounds++; else p2Rounds++;

  if (p1Rounds === 3 || p2Rounds === 3) {
    matchOver = true;
    gameOver = true;
    if (winner === 1) p1Medals++; else p2Medals++;
    playWinMusic();
    const winnerName = winner===1 ? player1Name : player2Name;
    showPopup(`\uCD95\uD558\uD569\uB2C8\uB2E4!`, `\uCD5C\uC885 \uC2B9\uC790: ${winnerName}  (${p1Rounds*10} - ${p2Rounds*10})`, true);
  } else {
    playLoseMusic();
    showPopup(`ROUND ${p1Rounds+p2Rounds} WINNER`, `${winner===1?player1Name:player2Name}  (${p1Rounds*10} - ${p2Rounds*10})`, false);
  }
}

function showPopup(title, sub, isMatchEnd) {
  document.getElementById('popupTitle').textContent = title;
  document.getElementById('popupSub').textContent = sub;
  document.getElementById('popup').classList.remove('hidden');
  const primary = document.getElementById('popupBtnPrimary');
  const noBtn = document.getElementById('popupBtnNo');
  if (isMatchEnd) {
    primary.textContent = 'YES';
    noBtn.classList.remove('hidden');
    primary.onclick = () => {
      document.getElementById('popup').classList.add('hidden');
      resetMatch();
    };
    noBtn.onclick = () => {
      document.getElementById('popup').classList.add('hidden');
      document.getElementById('ui-overlay').classList.remove('hidden');
      stopBGM();
    };
  } else {
    primary.textContent = 'NEXT ROUND';
    noBtn.classList.add('hidden');
    primary.onclick = () => {
      document.getElementById('popup').classList.add('hidden');
      nextRound();
    };
  }
}

function nextRound() {
  p1Life = 3; p2Life = 3;
  gameOver = false;
  roundActive = true;
  generateTerrain();
  placeTanks();
  randomizeWind();
  currentTurn = (p1Rounds+p2Rounds) % 2 === 0 ? 1 : 2;
  updateFireButtons();
}

function resetMatch() {
  p1Rounds = 0; p2Rounds = 0;
  p1Fuel = 20; p2Fuel = 20; // fuel only resets when a match has just been decided
  updateFuelBar('fuelBar1', p1Fuel);
  updateFuelBar('fuelBar2', p2Fuel);
  nextRound();
}

//// ---------- ANIMATION LOOP ----------
function loop() {
  if (projectile) updateProjectile();
  if (explosionFx) {
    explosionFx.r += 2.5; explosionFx.t++;
    if (explosionFx.t > 14) explosionFx = null;
  }
  updateTankExplosions();
  updateMusicState();
  render();
  animId = requestAnimationFrame(loop);
}

//// ---------- UI WIRING ----------
const angle1 = document.getElementById('angle1');
const power1 = document.getElementById('power1');
const angle2 = document.getElementById('angle2');
const power2 = document.getElementById('power2');
const angleVal1 = document.getElementById('angleVal1');
const powerVal1 = document.getElementById('powerVal1');
const angleVal2 = document.getElementById('angleVal2');
const powerVal2 = document.getElementById('powerVal2');
const fireBtn1 = document.getElementById('fireBtn1');
const fireBtn2 = document.getElementById('fireBtn2');

angle1.addEventListener('input', () => { tankP1.angle = +angle1.value; angleVal1.textContent = angle1.value; });
power1.addEventListener('input', () => { tankP1.power = +power1.value; powerVal1.textContent = power1.value; });
angle2.addEventListener('input', () => { tankP2.angle = +angle2.value; angleVal2.textContent = angle2.value; });
power2.addEventListener('input', () => { tankP2.power = +power2.value; powerVal2.textContent = power2.value; });

fireBtn1.addEventListener('click', () => { if (currentTurn===1) fire(1); });
fireBtn2.addEventListener('click', () => { if (currentTurn===2) fire(2); });

function updateFireButtons() {
  fireBtn1.disabled = !(currentTurn===1 && roundActive);
  fireBtn2.disabled = !(currentTurn===2 && roundActive);
}

//// ---------- FUEL BAR ----------
function buildFuelBar(id) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  for (let i=0;i<20;i++) {
    const seg = document.createElement('div');
    seg.className = 'fuelSeg';
    el.appendChild(seg);
  }
}
function updateFuelBar(id, fuel) {
  const el = document.getElementById(id);
  Array.from(el.children).forEach((seg,i) => seg.classList.toggle('filled', i < fuel));
}
buildFuelBar('fuelBar1');
buildFuelBar('fuelBar2');
updateFuelBar('fuelBar1', p1Fuel);
updateFuelBar('fuelBar2', p2Fuel);

//// ---------- TANK MOVEMENT (left/right, confined to each half, fuel-limited) ----------
const MOVE_STEP = 3;
let moveIntervalP1 = null, moveIntervalP2 = null;
let moveTicks1 = 0, moveTicks2 = 0;

function startMove(playerNum, dir) {
  if (currentTurn !== playerNum || !roundActive || gameOver || projectile) return;
  const fuel = playerNum === 1 ? p1Fuel : p2Fuel;
  if (fuel <= 0) return;
  stopMove(playerNum);
  const tank = playerNum === 1 ? tankP1 : tankP2;
  const minX = playerNum === 1 ? 20 : W/2 + 10;
  const maxX = playerNum === 1 ? W/2 - 10 : W - 20;
  const tick = () => {
    const curFuel = playerNum === 1 ? p1Fuel : p2Fuel;
    if (curFuel <= 0) { stopMove(playerNum); return; }
    const nx = Math.max(minX, Math.min(maxX, tank.x + dir*MOVE_STEP));
    if (nx !== tank.x) {
      tank.x = nx;
      tank.y = terrainHeightAt(tank.x);
      sfxMove();
      if (playerNum === 1) {
        moveTicks1++;
        if (moveTicks1 % 20 === 0) { p1Fuel--; updateFuelBar('fuelBar1', p1Fuel); }
        if (p1Fuel <= 0) stopMove(1);
      } else {
        moveTicks2++;
        if (moveTicks2 % 20 === 0) { p2Fuel--; updateFuelBar('fuelBar2', p2Fuel); }
        if (p2Fuel <= 0) stopMove(2);
      }
    }
  };
  tick();
  const id = setInterval(tick, 70);
  if (playerNum === 1) moveIntervalP1 = id; else moveIntervalP2 = id;
}

function stopMove(playerNum) {
  if (playerNum === 1 && moveIntervalP1) { clearInterval(moveIntervalP1); moveIntervalP1 = null; }
  if (playerNum === 2 && moveIntervalP2) { clearInterval(moveIntervalP2); moveIntervalP2 = null; }
}

function wireMoveButton(id, playerNum, dir) {
  const btn = document.getElementById(id);
  const start = (e) => { e.preventDefault(); startMove(playerNum, dir); };
  const stop = () => stopMove(playerNum);
  btn.addEventListener('mousedown', start);
  btn.addEventListener('touchstart', start, {passive:false});
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
  btn.addEventListener('touchend', stop);
  btn.addEventListener('touchcancel', stop);
}
wireMoveButton('moveLeft1', 1, -1);
wireMoveButton('moveRight1', 1, 1);
wireMoveButton('moveLeft2', 2, -1);
wireMoveButton('moveRight2', 2, 1);

document.getElementById('startBtn').addEventListener('click', () => {
  const n1 = document.getElementById('name1').value.trim();
  const n2 = document.getElementById('name2').value.trim();
  player1Name = n1 || 'PLAYER 1';
  player2Name = n2 || 'PLAYER 2';
  p1Medals = 0; p2Medals = 0;
  p1Fuel = 20; p2Fuel = 20;
  updateFuelBar('fuelBar1', p1Fuel);
  updateFuelBar('fuelBar2', p2Fuel);
  document.getElementById('ui-overlay').classList.add('hidden');
  playStartMusic();
  resetMatch();
  skyStartTime = performance.now();
  startBGM();
  if (!animId) loop();
});

generateTerrain();
placeTanks();
render();
</script>
